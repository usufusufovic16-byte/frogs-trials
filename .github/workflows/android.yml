name: Build Android APK

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Android SDK components
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platform-tools" \
            "build-tools;34.0.0" \
            "platforms;android-34" \
            "platforms;android-35" \
            "ndk;25.2.9519653"

      - name: Setup Godot 4.6
        run: |
          wget -q "https://github.com/godotengine/godot/releases/download/4.6-stable/Godot_v4.6-stable_linux.x86_64.zip" -O godot.zip
          unzip -q godot.zip
          chmod +x Godot_v4.6-stable_linux.x86_64
          sudo mv Godot_v4.6-stable_linux.x86_64 /usr/local/bin/godot
          mkdir -p ~/.local/share/godot/export_templates/4.6.0.stable
          wget -q "https://github.com/godotengine/godot/releases/download/4.6-stable/Godot_v4.6-stable_export_templates.tpz" -O templates.tpz
          unzip -q templates.tpz -d /tmp/tpz
          mv /tmp/tpz/templates/* ~/.local/share/godot/export_templates/4.6.0.stable/

      - name: Configure Android settings
        env:
          WS: ${{ github.workspace }}
        run: |
          mkdir -p ~/.config/godot
          python3 -c "
          import os
          ws = os.environ['WS']
          ah = os.environ['ANDROID_HOME']
          jh = os.environ['JAVA_HOME']
          lines = [
            '[gd_resource type=\"EditorSettings\" format=3]',
            '',
            '[resource]',
            'export/android/android_sdk_path = \"' + ah + '\"',
            'export/android/android_ndk_path = \"' + ah + '/ndk/25.2.9519653\"',
            'export/android/java_sdk_path = \"' + jh + '\"',
            'export/android/debug_keystore = \"' + ws + '/android-debug.keystore\"',
            'export/android/debug_keystore_user = \"androiddebugkey\"',
            'export/android/debug_keystore_pass = \"android\"',
          ]
          s = '\n'.join(lines) + '\n'
          p = os.path.expanduser('~/.config/godot/editor_settings-4.6.tres')
          open(p, 'w').write(s)
          print('EditorSettings:')
          print(s)
          "

      - name: Diagnose paths
        env:
          WS: ${{ github.workspace }}
        run: |
          echo "=== jarsigner ==="
          ls -la $JAVA_HOME/bin/jarsigner || echo "MISSING"
          echo "=== adb ==="
          ls -la $ANDROID_HOME/platform-tools/adb || echo "MISSING"
          echo "=== build-tools ==="
          ls $ANDROID_HOME/build-tools/ || echo "MISSING"
          echo "=== platforms ==="
          ls $ANDROID_HOME/platforms/ || echo "MISSING"
          echo "=== keystore ==="
          ls -la $WS/android-debug.keystore || echo "MISSING"
          echo "=== templates ==="
          ls ~/.local/share/godot/export_templates/4.6.0.stable/ | grep android || echo "MISSING"

      - name: Start ADB
        run: $ANDROID_HOME/platform-tools/adb start-server

      - name: Export Android APK
        env:
          WS: ${{ github.workspace }}
          GODOT_ANDROID_KEYSTORE_DEBUG_PATH: ${{ github.workspace }}/android-debug.keystore
          GODOT_ANDROID_KEYSTORE_DEBUG_USER: androiddebugkey
          GODOT_ANDROID_KEYSTORE_DEBUG_PASSWORD: android
        run: |
          sudo apt-get install -y xvfb
          Xvfb :99 -screen 0 1024x768x24 &
          sleep 2
          mkdir -p "$WS/build"
          DISPLAY=:99 timeout 300 godot --headless --path "$WS" --export-debug "Android" "$WS/build/frogs-trials.apk" 2>&1
          ls -la "$WS/build/"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: frogs-trials-apk
          path: build/frogs-trials.apk
          retention-days: 30
