name: Build Android APK

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Accept SDK licenses and install components
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platform-tools" \
            "build-tools;34.0.0" \
            "platforms;android-34" \
            "ndk;25.2.9519653"

      - name: Download Godot 4.6 headless
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/4.6-stable/Godot_v4.6-stable_linux.x86_64.zip
          unzip -q Godot_v4.6-stable_linux.x86_64.zip
          chmod +x Godot_v4.6-stable_linux.x86_64
          sudo mv Godot_v4.6-stable_linux.x86_64 /usr/local/bin/godot

      - name: Download export templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/4.6.stable
          wget -q https://github.com/godotengine/godot/releases/download/4.6-stable/Godot_v4.6-stable_export_templates.tpz
          unzip -q Godot_v4.6-stable_export_templates.tpz -d /tmp/templates
          mv /tmp/templates/templates/* ~/.local/share/godot/export_templates/4.6.stable/

      - name: Setup Godot editor settings
        run: |
          mkdir -p ~/.config/godot
          {
            echo '[gd_resource type="EditorSettings" format=3]'
            echo ''
            echo '[resource]'
            echo "export/android/android_sdk_path = \"$ANDROID_HOME\""
            echo "export/android/debug_keystore = \"$GITHUB_WORKSPACE/android-debug.keystore\""
            echo 'export/android/debug_keystore_user = "androiddebugkey"'
            echo 'export/android/debug_keystore_pass = "android"'
          } > ~/.config/godot/editor_settings-4.tres
          echo "=== Editor settings ==="
          cat ~/.config/godot/editor_settings-4.tres
          echo "=== SDK NDK ==="
          ls "$ANDROID_HOME/ndk/" || echo "NDK missing"
          ls "$ANDROID_HOME/build-tools/" || echo "build-tools missing"

      - name: Export APK
        run: |
          mkdir -p build
          godot --headless --verbose --export-debug "Android" "$GITHUB_WORKSPACE/build/frogs-trials.apk" 2>&1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: frogs-trials-apk
          path: build/frogs-trials.apk
          retention-days: 30
