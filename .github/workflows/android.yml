name: Build Android APK

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Android SDK components
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platform-tools" \
            "build-tools;34.0.0" \
            "platforms;android-34" \
            "ndk;25.2.9519653"

      - name: Download Godot 4.6
        run: |
          wget -q "https://github.com/godotengine/godot/releases/download/4.6-stable/Godot_v4.6-stable_linux.x86_64.zip" -O godot.zip
          unzip -q godot.zip
          chmod +x Godot_v4.6-stable_linux.x86_64
          sudo mv Godot_v4.6-stable_linux.x86_64 /usr/local/bin/godot

      - name: Download export templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/4.6.stable
          wget -q "https://github.com/godotengine/godot/releases/download/4.6-stable/Godot_v4.6-stable_export_templates.tpz" -O templates.tpz
          unzip -q templates.tpz -d /tmp/tpz
          mv /tmp/tpz/templates/* ~/.local/share/godot/export_templates/4.6.stable/
          echo "=== Android templates ==="
          ls ~/.local/share/godot/export_templates/4.6.stable/ | grep -i android || echo "NO ANDROID TEMPLATES"

      - name: Configure editor settings
        run: |
          mkdir -p ~/.config/godot
          printf '[gd_resource type="EditorSettings" format=3]\n\n[resource]\nexport/android/android_sdk_path = "%s"\nexport/android/debug_keystore = "%s/android-debug.keystore"\nexport/android/debug_keystore_user = "androiddebugkey"\nexport/android/debug_keystore_pass = "android"\n' \
            "$ANDROID_HOME" "$GITHUB_WORKSPACE" \
            > ~/.config/godot/editor_settings-4.tres
          echo "=== Editor settings ==="
          cat ~/.config/godot/editor_settings-4.tres
          echo "=== Keystore ==="
          ls -la "$GITHUB_WORKSPACE/android-debug.keystore" && echo "OK" || echo "MISSING"
          echo "=== NDK ==="
          ls "$ANDROID_HOME/ndk/" && echo "OK" || echo "MISSING"

      - name: Start ADB daemon
        run: |
          $ANDROID_HOME/platform-tools/adb start-server
          echo "ADB started"

      - name: Import project assets
        run: |
          godot --headless --path "$GITHUB_WORKSPACE" --editor --quit 2>&1 || true

      - name: Export Android APK
        run: |
          mkdir -p "$GITHUB_WORKSPACE/build"
          godot --headless --path "$GITHUB_WORKSPACE" --export-debug "Android" "$GITHUB_WORKSPACE/build/frogs-trials.apk" 2>&1
          echo "=== Build output ==="
          ls -la "$GITHUB_WORKSPACE/build/"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: frogs-trials-apk
          path: build/frogs-trials.apk
          if-no-files-found: warn
          retention-days: 30

      - name: Upload Godot logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: godot-logs
          path: ~/.local/share/godot/logs/
          if-no-files-found: warn
          retention-days: 7
