name: Build Android APK

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Android SDK components
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platform-tools" \
            "build-tools;34.0.0" \
            "platforms;android-34" \
            "platforms;android-35" \
            "ndk;25.2.9519653"

      - name: Setup Godot 4.6
        run: |
          wget -q "https://github.com/godotengine/godot/releases/download/4.6-stable/Godot_v4.6-stable_linux.x86_64.zip" -O godot.zip
          unzip -q godot.zip
          chmod +x Godot_v4.6-stable_linux.x86_64
          sudo mv Godot_v4.6-stable_linux.x86_64 /usr/local/bin/godot
          mkdir -p ~/.local/share/godot/export_templates/4.6.stable
          wget -q "https://github.com/godotengine/godot/releases/download/4.6-stable/Godot_v4.6-stable_export_templates.tpz" -O templates.tpz
          unzip -q templates.tpz -d /tmp/tpz
          mv /tmp/tpz/templates/* ~/.local/share/godot/export_templates/4.6.stable/

      - name: Configure Android settings
        env:
          WS: ${{ github.workspace }}
        run: |
          mkdir -p ~/.config/godot

          # EditorSettings: SDK, NDK, Java paths
          cat > ~/.config/godot/editor_settings-4.6.tres << EOF
[gd_resource type="EditorSettings" format=3]

[resource]
export/android/android_sdk_path = "$ANDROID_HOME"
export/android/android_ndk_path = "$ANDROID_HOME/ndk/25.2.9519653"
export/android/java_sdk_path = "$JAVA_HOME"
export/android/debug_keystore = "$WS/android-debug.keystore"
export/android/debug_keystore_user = "androiddebugkey"
export/android/debug_keystore_pass = "android"
EOF

          # Also patch export_presets.cfg with keystore path directly in preset
          python3 << 'PYEOF'
import re, os
ws = os.environ["WS"]
path = f"{ws}/export_presets.cfg"

with open(path) as f:
    content = f.read()

def patch(text, key, val):
    pattern = re.compile(rf'^({re.escape(key)})=.*$', re.MULTILINE)
    replacement = rf'\1="{val}"'
    if pattern.search(text):
        return pattern.sub(replacement, text)
    return text

content = patch(content, 'keystore/debug', f"{ws}/android-debug.keystore")
content = patch(content, 'keystore/debug_user', 'androiddebugkey')
content = patch(content, 'keystore/debug_password', 'android')

with open(path, "w") as f:
    f.write(content)

print("=== export_presets.cfg after patching ===")
print(content)
PYEOF

      - name: Start ADB
        run: $ANDROID_HOME/platform-tools/adb start-server

      - name: Export Android APK
        env:
          WS: ${{ github.workspace }}
        run: |
          sudo apt-get install -y xvfb
          Xvfb :99 -screen 0 1024x768x24 &
          sleep 2
          mkdir -p "$WS/build"
          DISPLAY=:99 timeout 300 godot --headless --path "$WS" --export-debug "Android" "$WS/build/frogs-trials.apk" 2>&1
          ls -la "$WS/build/"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: frogs-trials-apk
          path: build/frogs-trials.apk
          retention-days: 30
